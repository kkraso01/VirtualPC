version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: virtualpc
      POSTGRES_PASSWORD: virtualpc
      POSTGRES_DB: virtualpc
    ports: ["5432:5432"]
  nats:
    image: nats:2.10
    command: ["-js"]
    ports: ["4222:4222"]
  minio:
    image: minio/minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]
  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: virtualpc
      POSTGRES_PWD: virtualpc
      POSTGRES_SEEDS: postgres
    depends_on: [postgres]
    ports: ["7233:7233"]
  virtualpcd:
    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile.virtualpcd
    volumes:
      - /tmp:/tmp
      - ../../data:/data
    environment:
      VPCD_UNIX_SOCKET: /tmp/virtualpcd.sock
      VPCD_DATA_PATH: /data/state.json
      VPCD_FIRECRACKER_DIR: /data/firecracker
